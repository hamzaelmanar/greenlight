version: 2

sources:
  - name: raw
    schema: main
    description: "Raw tables loaded by ingestion/load_to_duckdb.py from lead-gen jobs.csv"
    tables:
      - name: raw_offer_skills
        description: "Missing skills unpacked from lead-gen scored offers (one row per offer × skill)"
        columns:
          - name: offer_id
            description: "MD5 slug of the offer URL"
            tests: [not_null]
          - name: skill
            description: "Lowercase skill name from missing_skills field"
            tests: [not_null]
          - name: mention_count
            description: "Always 1 — presence flag, frequency aggregated in skill_frequency mart"
            tests: [not_null]
